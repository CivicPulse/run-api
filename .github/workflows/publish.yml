name: Build & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build timestamp
        id: timestamp
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/civicpulse/run-api
          tags: |
            type=sha,format=long
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIMESTAMP=${{ steps.timestamp.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update K8s manifest
        if: github.ref == 'refs/heads/main'
        run: |
          sed -i "s|image: ghcr.io/civicpulse/run-api:.*|image: ghcr.io/civicpulse/run-api:sha-${{ github.sha }}|" k8s/deployment.yaml

      - name: Commit manifest update
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update deployment image to sha-${{ github.sha }}"
          git push
