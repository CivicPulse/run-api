name: Build & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - 'k8s/**'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  build-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build timestamp
        id: timestamp
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/civicpulse/run-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIMESTAMP=${{ steps.timestamp.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Update K8s Manifests
    needs: build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update image tag in manifests
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="ghcr.io/civicpulse/run-api:sha-${SHORT_SHA}"
          sed -i "s|image: ghcr.io/civicpulse/run-api:.*|image: ${IMAGE}|g" \
            k8s/apps/run-api-dev/deployment.yaml \
            k8s/apps/run-api-prod/deployment.yaml

      - name: Commit and push
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/apps/run-api-dev/deployment.yaml k8s/apps/run-api-prod/deployment.yaml
          git diff --staged --quiet || git commit -m "chore: update run-api image to sha-${SHORT_SHA} [skip ci]"
          git pull --rebase origin main
          git push
