name: PR Validation

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run unit tests
        run: uv run pytest -m "not integration and not e2e" -x -q

  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Build
        working-directory: web
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        run: |
          docker build . \
            --build-arg GIT_SHA=${{ github.sha }} \
            --build-arg BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

  integration-e2e:
    name: Integration & E2E Tests
    runs-on: ubuntu-latest
    needs: [lint, test, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Start services
        run: docker compose up -d --build --wait
        env:
          ZITADEL_TLS_MODE: disabled
          ZITADEL_EXTERNAL_SECURE: "false"
          ZITADEL_DOMAIN: localhost
          DISABLE_TLS: "true"

      - name: Wait for ZITADEL readiness
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/debug/ready && echo "ZITADEL ready" && exit 0
            echo "Waiting for ZITADEL... ($i/60)"
            sleep 2
          done
          echo "ZITADEL did not become ready" && exit 1

      - name: Run migrations and seed
        run: |
          docker compose exec -T api bash -c "PYTHONPATH=/home/app alembic upgrade head"
          docker compose exec -T api bash -c "PYTHONPATH=/home/app python scripts/seed.py"

      - name: Create E2E test users
        run: |
          docker compose exec -T api bash -c "PYTHONPATH=/home/app python scripts/create-e2e-users.py"

      - name: Install Python test dependencies
        run: uv sync --frozen --dev

      - name: Run integration tests
        run: uv run pytest tests/integration/ -m integration -x -q
        env:
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5433/run_api"

      - name: Install Playwright browsers
        working-directory: web
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: web
        run: npx playwright test
        env:
          E2E_USERNAME: admin@localhost
          E2E_PASSWORD: "Admin1234!"
          E2E_ORGADMIN_USERNAME: e2e-orgadmin@localhost
          E2E_ORGADMIN_PASSWORD: "E2eOrgAdmin1!"
          E2E_VOLUNTEER_USERNAME: e2e-volunteer@localhost
          E2E_VOLUNTEER_PASSWORD: "E2eVolunteer1!"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

      - name: Upload Playwright traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: web/test-results/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose down -v
