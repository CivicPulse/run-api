name: PR Validation

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run unit tests
        run: uv run pytest -m "not integration and not e2e" -x -q

  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Build
        working-directory: web
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        run: |
          docker build . \
            --build-arg GIT_SHA=${{ github.sha }} \
            --build-arg BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, test, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Start services
        run: docker compose up -d --build --wait
        env:
          ZITADEL_TLS_MODE: disabled
          ZITADEL_EXTERNAL_SECURE: "false"
          ZITADEL_DOMAIN: localhost
          DISABLE_TLS: "true"

      - name: Dump compose logs on startup failure
        if: failure()
        run: |
          echo "===== docker compose ps ====="
          docker compose ps -a || true
          echo "===== zitadel logs ====="
          docker compose logs zitadel || true
          echo "===== zitadel-bootstrap logs ====="
          docker compose logs zitadel-bootstrap || true
          echo "===== zitadel-db logs ====="
          docker compose logs zitadel-db || true

      - name: Wait for ZITADEL readiness
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/debug/ready && echo "ZITADEL ready" && exit 0
            echo "Waiting for ZITADEL... ($i/60)"
            sleep 2
          done
          echo "ZITADEL did not become ready" && exit 1

      - name: Run migrations and seed
        run: |
          docker compose exec -T api bash -c "PYTHONPATH=/home/app alembic upgrade head"
          docker compose exec -T api bash -c "PYTHONPATH=/home/app python scripts/seed.py"

      - name: Install Python test dependencies
        run: uv sync --frozen --dev

      - name: Run integration tests
        run: uv run pytest tests/integration/ -m integration -x -q
        env:
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5433/run_api"

      - name: Stop services
        if: always()
        run: docker compose down -v

  e2e-tests:
    name: E2E Tests (Shard ${{ matrix.shardIndex }}/4)
    runs-on: ubuntu-latest
    needs: [lint, test, frontend]
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Start services
        run: docker compose up -d --build --wait
        env:
          ZITADEL_TLS_MODE: disabled
          ZITADEL_EXTERNAL_SECURE: "false"
          ZITADEL_DOMAIN: localhost
          DISABLE_TLS: "true"

      - name: Dump compose logs on startup failure
        if: failure()
        run: |
          echo "===== docker compose ps ====="
          docker compose ps -a || true
          echo "===== zitadel logs ====="
          docker compose logs zitadel || true
          echo "===== zitadel-bootstrap logs ====="
          docker compose logs zitadel-bootstrap || true
          echo "===== zitadel-db logs ====="
          docker compose logs zitadel-db || true

      - name: Wait for ZITADEL readiness
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/debug/ready && echo "ZITADEL ready" && exit 0
            echo "Waiting for ZITADEL... ($i/60)"
            sleep 2
          done
          echo "ZITADEL did not become ready" && exit 1

      - name: Run migrations and seed
        run: |
          docker compose exec -T api bash -c "PYTHONPATH=/home/app alembic upgrade head"
          docker compose exec -T api bash -c "PYTHONPATH=/home/app python scripts/seed.py"

      - name: Create E2E test users
        run: |
          docker compose exec -T api bash -c "PYTHONPATH=/home/app python scripts/create-e2e-users.py"

      - name: Verify no-MFA policy is enforced (fail on policy drift)
        run: |
          docker compose exec -T api bash -c "PYTHONPATH=/home/app python scripts/create-e2e-users.py --verify-policy-only --strict-policy"

      - name: Install Playwright browsers
        working-directory: web
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Run auth setup smoke projects (deterministic gate)
        working-directory: web
        run: npx playwright test --project=setup-owner --project=setup-admin --project=setup-manager --project=setup-volunteer --project=setup-viewer --workers=1

      - name: Run Phase 63 strict no-skip gate (PB-10 + FIELD-08/09/10)
        if: matrix.shardIndex == 1
        working-directory: web
        run: ./scripts/run-e2e.sh --strict-phase63-no-skip

      - name: Run E2E tests
        working-directory: web
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          E2E_OWNER_USERNAME: owner1@localhost
          E2E_OWNER_PASSWORD: "Owner1234!"
          E2E_ADMIN_USERNAME: admin1@localhost
          E2E_ADMIN_PASSWORD: "Admin1234!"
          E2E_MANAGER_USERNAME: manager1@localhost
          E2E_MANAGER_PASSWORD: "Manager1234!"
          E2E_VOLUNTEER_USERNAME: volunteer1@localhost
          E2E_VOLUNTEER_PASSWORD: "Volunteer1234!"
          E2E_VIEWER_USERNAME: viewer1@localhost
          E2E_VIEWER_PASSWORD: "Viewer1234!"

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: web/blob-report
          retention-days: 1

      - name: Upload Playwright traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces-${{ matrix.shardIndex }}
          path: web/test-results/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose down -v

  merge-e2e-reports:
    name: Merge E2E Reports
    if: ${{ !cancelled() }}
    needs: [e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install Playwright
        working-directory: web
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: web/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge reports
        working-directory: web
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
