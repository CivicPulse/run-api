apiVersion: v1
kind: ConfigMap
metadata:
  name: run-api-config
  namespace: civpulse-prod
data:
  APP_NAME: "CivicPulse Run API"
  DEBUG: "false"
  APP_BASE_URL: "https://run.civpulse.org"
  CORS_ALLOWED_ORIGINS: '["https://run.civpulse.org"]'
  ZITADEL_BASE_URL: "http://zitadel.civpulse-infra.svc.cluster.local:8080"
  EMAIL_PROVIDER: "mailgun"
  MAILGUN_DOMAIN: "mg.civpulse.org"
  EMAIL_SENDER_ADDRESS: "no_reply@mg.civpulse.org"
  EMAIL_SENDER_NAME: "CivicPulse Run"
