# CI auto-updates the image tag on every main push
apiVersion: apps/v1
kind: Deployment
metadata:
  name: run-api
  namespace: run-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: run-api
  template:
    metadata:
      labels:
        app: run-api
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/civicpulse/run-api:sha-069d7f1e8e4e4c98559a409e17c4a3797961808d
          command: ["python", "-m", "alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: run-api-config
            - secretRef:
                name: run-api-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      containers:
        - name: run-api
          image: ghcr.io/civicpulse/run-api:sha-069d7f1e8e4e4c98559a409e17c4a3797961808d
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: run-api-config
            - secretRef:
                name: run-api-secret
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            runAsNonRoot: true
