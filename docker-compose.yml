services:
  postgres:
    image: postgis/postgis:17-3.5
    container_name: run-api-postgres
    environment:
      POSTGRES_DB: run_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d run_api"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
