services:
  api:
    build:
      context: .
      target: dev
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_ZITADEL_ISSUER: ${VITE_ZITADEL_ISSUER:-http://localhost:8080}
        VITE_ZITADEL_CLIENT_ID: ${VITE_ZITADEL_CLIENT_ID}
        VITE_ZITADEL_PROJECT_ID: ${VITE_ZITADEL_PROJECT_ID}
    command: bash /home/app/scripts/dev-entrypoint.sh
    container_name: run-api-api
    ports:
      - "8000:8000"
    env_file:
      - .env
      - path: .env.zitadel
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/run_api
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@postgres:5432/run_api
      S3_ENDPOINT_URL: http://minio:9000
      S3_PRESIGN_ENDPOINT_URL: http://localhost:9000
      DISABLE_TLS: ${DISABLE_TLS:-false}
    volumes:
      - ./app:/home/app/app
      - ./main.py:/home/app/main.py
      - ./alembic:/home/app/alembic
      - ./alembic.ini:/home/app/alembic.ini
      - ./scripts:/home/app/scripts
      - ./static:/home/app/static:ro
      - ./certs:/home/app/certs:ro
      - ./.zitadel-data:/home/app/zitadel-data:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      zitadel-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    image: node:22-slim
    container_name: run-api-web
    working_dir: /home/app/web
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    environment:
      API_PROXY_TARGET: http://api:8000
      MINIO_PROXY_TARGET: http://minio:9000
    env_file:
      - path: web/.env.local
        required: false
    volumes:
      - ./web:/home/app/web
      - ./certs:/home/app/certs:ro
      - web_node_modules:/home/app/web/node_modules
    depends_on:
      - api
    restart: unless-stopped

  worker:
    build:
      context: .
      target: dev
    container_name: run-api-worker
    command: ["python", "scripts/worker.py"]
    env_file:
      - .env
      - path: .env.zitadel
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/run_api
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@postgres:5432/run_api
      S3_ENDPOINT_URL: http://minio:9000
    volumes:
      - ./app:/home/app/app
      - ./scripts:/home/app/scripts
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgis/postgis:17-3.5
    container_name: run-api-postgres
    environment:
      POSTGRES_DB: run_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d run_api"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    container_name: run-api-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Local ZITADEL auth server
  # ---------------------------------------------------------------------------
  zitadel-db:
    image: postgres:17
    container_name: run-api-zitadel-db
    environment:
      POSTGRES_DB: ${ZITADEL_DB_NAME:-zitadel}
      POSTGRES_USER: ${ZITADEL_DB_USER:-zitadel}
      POSTGRES_PASSWORD: ${ZITADEL_DB_PASSWORD:-zitadel}
    ports:
      - "5434:5432"
    volumes:
      - zitadel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zitadel -d zitadel"]
      interval: 5s
      timeout: 5s
      retries: 5

  zitadel:
    image: ghcr.io/zitadel/zitadel:v2.71.6
    container_name: run-api-zitadel
    command: start-from-init --masterkey "${ZITADEL_MASTERKEY:-LocalDevMasterkeyExactly32Chars!}" --tlsMode ${ZITADEL_TLS_MODE:-disabled}
    environment:
      # Database connection
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel-db
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${ZITADEL_DB_USER:-zitadel}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD:-zitadel}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${ZITADEL_DB_USER:-zitadel}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${ZITADEL_DB_PASSWORD:-zitadel}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      # External URL configuration
      ZITADEL_EXTERNALSECURE: ${ZITADEL_EXTERNAL_SECURE:-false}
      ZITADEL_EXTERNALPORT: ${ZITADEL_EXTERNAL_PORT:-8080}
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_DOMAIN:-localhost}
      # TLS (only used when ZITADEL_TLS_MODE=enabled)
      ZITADEL_TLS_CERTPATH: /certs/dev.tailb56d83.ts.net.crt
      ZITADEL_TLS_KEYPATH: /certs/dev.tailb56d83.ts.net.key
      # First instance: admin user
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin@localhost
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: "${ZITADEL_ADMIN_PASSWORD:-Admin1234!}"
      # First instance: machine user (service account) with PAT
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: run-api-service
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: "Run API Service Account"
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
      ZITADEL_FIRSTINSTANCE_PATPATH: /zitadel-data/pat.txt
    ports:
      - "8080:8080"
    volumes:
      - ./.zitadel-data:/zitadel-data
      - ./certs:/certs:ro
    depends_on:
      zitadel-db:
        condition: service_healthy
    # Note: no healthcheck — ZITADEL's distroless image lacks curl/wget
    # and `zitadel ready` CLI requires DB config. The bootstrap script
    # polls the HTTP health endpoint instead.

  zitadel-bootstrap:
    build:
      context: .
      target: dev
    container_name: run-api-zitadel-bootstrap
    command: ["python", "/home/app/scripts/bootstrap-zitadel.py"]
    volumes:
      - ./scripts:/home/app/scripts
      - ./.zitadel-data:/zitadel-data
      - .:/home/app/output
    environment:
      ZITADEL_DOMAIN: ${ZITADEL_DOMAIN:-localhost}
      ZITADEL_EXTERNAL_PORT: ${ZITADEL_EXTERNAL_PORT:-8080}
      ZITADEL_EXTERNAL_SECURE: ${ZITADEL_EXTERNAL_SECURE:-false}
    depends_on:
      zitadel:
        condition: service_started

volumes:
  pgdata:
  minio_data:
  zitadel_pgdata:
  web_node_modules:
