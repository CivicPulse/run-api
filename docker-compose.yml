services:
  api:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_ZITADEL_ISSUER: ${VITE_ZITADEL_ISSUER:-https://auth.civpulse.org}
        VITE_ZITADEL_CLIENT_ID: ${VITE_ZITADEL_CLIENT_ID}
        VITE_ZITADEL_PROJECT_ID: ${VITE_ZITADEL_PROJECT_ID}
    command: bash /home/app/scripts/dev-entrypoint.sh
    container_name: run-api-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/run_api
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@postgres:5432/run_api
      S3_ENDPOINT_URL: http://minio:9000
    volumes:
      - ./app:/home/app/app
      - ./main.py:/home/app/main.py
      - ./alembic:/home/app/alembic
      - ./alembic.ini:/home/app/alembic.ini
      - ./scripts:/home/app/scripts
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgis/postgis:17-3.5
    container_name: run-api-postgres
    environment:
      POSTGRES_DB: run_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d run_api"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    container_name: run-api-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  minio_data:
